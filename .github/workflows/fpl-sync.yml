name: FPL Auto-Sync & Model Run

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

env:
  DATA_REPO_URL: https://github.com/olbauday/FPL-Core-Insights.git
  DATA_DIR: ../fpl_data
  TZ: Asia/Hong_Kong

jobs:
  sync-and-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout model repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up R environment
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages(c("tidyverse", "data.table", "lubridate", "jsonlite"))
        shell: Rscript {0}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-ensemble.txt ]; then pip install -r requirements-ensemble.txt; fi

      - name: Clone FPL data repository
        run: |
          echo "📥 Cloning FPL-Core-Insights..."
          git clone --depth 1 ${{ env.DATA_REPO_URL }} ${{ env.DATA_DIR }}
          echo "✓ Data repository cloned"
          echo "CSV files found: $(find ${{ env.DATA_DIR }} -name '*.csv' 2>/dev/null | wc -l)"

      - name: Show environment info
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "📊 FPL DATA UPDATE"
          echo "════════════════════════════════════════════════════════"
          echo "Time (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')"
          echo "Time (HK): $(TZ=Asia/Hong_Kong date +'%Y-%m-%d %H:%M:%S')"
          echo "Data directory: ${{ env.DATA_DIR }}"
          echo "════════════════════════════════════════════════════════"

      - name: Run R data loading
        env:
          DATA_DIR: ${{ env.DATA_DIR }}/data
        run: |
          echo "🚀 Running R data loading script..."
          Rscript main_fpl_model.R
          echo "✓ R script completed"

      - name: Run projection model (generate_site.py)
        run: |
          echo "🤖 Running projection model..."
          python scripts/generate_site.py
          echo "✓ Projection model completed"
        continue-on-error: true

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add results/ outputs/ 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
          else
            git commit -m "🔄 Auto FPL update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✓ Changes pushed to repository"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpl-model-output-${{ github.run_id }}
          path: |
            results/
            outputs/
          retention-days: 30

      - name: Create job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ FPL Auto-Sync & Model Execution Summary
          
          | Property | Value |
          |----------|-------|
          | **Status** | ${{ job.status }} |
          | **Run ID** | ${{ github.run_id }} |
          | **Timestamp (UTC)** | $(date -u +'%Y-%m-%d %H:%M:%S') |
          | **Timestamp (HK)** | $(TZ=Asia/Hong_Kong date +'%Y-%m-%d %H:%M:%S') |
          | **Data Source** | FPL-Core-Insights |
          | **Model** | Projection model (generate_site.py) |
          
          ### 📊 Daily Schedule
          - Morning: 5:00 AM UTC = 1:00 PM HK
          - Evening: 5:00 PM UTC = 1:00 AM HK (next day)
          
          ### 🔗 Links
          - [View Repository](https://github.com/justinlkl/pl)
          - [View FPL Data Source](https://github.com/olbauday/FPL-Core-Insights)
          EOF
