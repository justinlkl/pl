name: FPL Auto-Sync & Model Run

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

env:
  DATA_REPO_URL: https://github.com/olbauday/FPL-Core-Insights.git
  DATA_DIR: ../fpl_data
  TZ: Asia/Hong_Kong

jobs:
  sync-and-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout model repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up R environment
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages(c("tidyverse", "data.table", "lubridate", "jsonlite"))
        shell: Rscript {0}

      - name: Clone FPL data repository
        run: |
          echo "📥 Cloning FPL-Core-Insights..."
          git clone --depth 1 ${{ env.DATA_REPO_URL }} ${{ env.DATA_DIR }}
          echo "✓ Data repository cloned"

      - name: Show environment info
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "📊 FPL DATA UPDATE"
          echo "════════════════════════════════════════════════════════"
          echo "Time (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')"
          echo "Time (HK): $(TZ=Asia/Hong_Kong date +'%Y-%m-%d %H:%M:%S')"
          echo "CSV files: $(find ${{ env.DATA_DIR }} -name '*.csv' 2>/dev/null | wc -l)"
          echo "════════════════════════════════════════════════════════"

      - name: Run R model
        env:
          DATA_DIR: ${{ env.DATA_DIR }}
        run: Rscript main_fpl_model.R
        shell: bash

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ outputs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
          else
            git commit -m "🔄 Auto FPL update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✓ Changes pushed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpl-output-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: Create job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ FPL Model Execution Summary
          
          | Property | Value |
          |----------|-------|
          | **Status** | ${{ job.status }} |
          | **Run ID** | ${{ github.run_id }} |
          | **Timestamp (UTC)** | $(date -u +'%Y-%m-%d %H:%M:%S') |
          | **Timestamp (HK)** | $(TZ=Asia/Hong_Kong date +'%Y-%m-%d %H:%M:%S') |
          
          ### 📊 Schedule
          - Morning: 5 AM UTC = 1 PM HK
          - Evening: 5 PM UTC = 1 AM HK (next day)
          
          ### 📂 Data Sources
          - FPL: [FPL-Core-Insights](https://github.com/olbauday/FPL-Core-Insights)
          - Model: [justinlkl/pl](https://github.com/justinlkl/pl)
          EOF
