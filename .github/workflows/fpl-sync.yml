name: FPL Auto-Sync & Model Run

on:
  schedule:
    # FPL-Core-Insights refreshes ~05:00 and ~17:00 UTC.
    # Run a few minutes after to reduce the chance of syncing mid-update.
    - cron: '10 5 * * *'
    - cron: '10 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fpl-auto-sync
  cancel-in-progress: true

env:
  DATA_REPO_URL: https://github.com/olbauday/FPL-Core-Insights.git
  DATA_BRANCH: main
  PYTHON_VERSION: '3.10'
  SEASON: '2025-2026'
  TARGET: 'xp_blend'
  EPOCHS: '20'
  EARLY_STOPPING_PATIENCE: '8'
  LR_PLATEAU_PATIENCE: '4'

jobs:
  sync-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout model repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync FPL-Core-Insights dataset
        run: |
          set -e
          echo "📥 Syncing FPL-Core-Insights..."

          if [ -d "FPL-Core-Insights/.git" ]; then
            echo "Found existing FPL-Core-Insights checkout; hard-resetting to origin/${DATA_BRANCH}"
            git -C FPL-Core-Insights fetch --depth=1 origin ${DATA_BRANCH}
            git -C FPL-Core-Insights reset --hard FETCH_HEAD
          else
            rm -rf FPL-Core-Insights
            git clone --depth 1 --branch ${DATA_BRANCH} ${DATA_REPO_URL} FPL-Core-Insights
          fi

          echo "✓ Data synced"
          echo "Latest data commit: $(git -C FPL-Core-Insights rev-parse --short HEAD)"
          echo "CSV count: $(find FPL-Core-Insights/data -name '*.csv' | wc -l)"

      - name: Ensure ensemble artifacts exist (train if missing)
        run: |
          set -e
          if [ -f "artifacts/ensemble/lstm_model.keras" ]; then
            echo "✓ Found artifacts/ensemble/lstm_model.keras; skipping training"
            exit 0
          fi

          echo "🧠 Missing artifacts/ensemble/lstm_model.keras; training ensemble..."
          python -u -m src.fpl_projection.ensemble_train \
            --season "${SEASON}" \
            --target "${TARGET}" \
            --mid-split \
            --backend sklearn \
            --epochs ${EPOCHS} \
            --early-stopping-patience ${EARLY_STOPPING_PATIENCE} \
            --lr-plateau-patience ${LR_PLATEAU_PATIENCE} \
            --artifacts-dir artifacts \
            --out-dir artifacts/ensemble

      - name: Run projection model
        run: |
          set -e
          echo "🤖 Generating projections (ensemble_predict)..."
          python -u -m src.fpl_projection.ensemble_predict \
            --season "${SEASON}" \
            --ensemble-dir artifacts/ensemble \
            --mid-split \
            --backend sklearn

          echo "✓ Wrote outputs/projections.csv + outputs/projections_internal.csv"

      - name: Regenerate static site JSON
        run: |
          set -e
          echo "🧱 Regenerating site data..."
          python scripts/generate_site.py

      - name: Commit and push results
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit only the generated artifacts that power your hosted site.
          # Stage only existing output files
          for f in \
            outputs/projections.csv \
            outputs/projections_internal.csv \
            site/data/projections.json \
            site/projections.json; do
            if [ -e "$f" ]; then
              git add "$f"
            else
              echo "Not found (skipping): $f"
            fi
          done

          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi

          git commit -m "🔄 Auto update projections ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git push

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpl-projections-${{ github.run_id }}
          path: |
            outputs/projections.csv
            outputs/projections_internal.csv
            site/data/projections.json
            site/projections.json
          if-no-files-found: warn
          retention-days: 14
